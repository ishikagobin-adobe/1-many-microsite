        const MONTH_ORDER = ["June","July","August","September","October","November","December"];
        const monthsPresent = MONTH_ORDER.filter(m => sessions.some(s => s.month === m));
        let currentMonth = monthsPresent[0];
        let currentCategory = "";

        // Populate month dropdown
        const monthSel = document.getElementById("monthFilter");
        monthsPresent.forEach(m => {
            const o = document.createElement("option");
            o.value = m; o.textContent = m + " 2026";
            monthSel.appendChild(o);
        });

        // Build month pills
        const nav = document.getElementById("monthNav");
        monthsPresent.forEach(m => {
            const b = document.createElement("button");
            b.className = "month-pill"; b.textContent = m; b.dataset.month = m;
            b.addEventListener("click", () => { currentMonth = m; sync(); });
            nav.appendChild(b);
        });

        function sync() {
            monthSel.value = currentMonth;
            document.querySelectorAll(".month-pill").forEach(p =>
                p.classList.toggle("active", p.dataset.month === currentMonth));
            render();
        }

        function render() {
            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";
            document.getElementById("monthHeading").innerHTML =
                currentMonth + ' <span>2026</span>';

            let filtered = sessions.filter(s => s.month === currentMonth);
            if (currentCategory) filtered = filtered.filter(s => s.category === currentCategory);
            filtered.sort((a,b) => a.iso.localeCompare(b.iso));

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-sessions"><p>No sessions found for this month' +
                    (currentCategory ? ' in this category.' : '.') + '</p></div>';
                document.getElementById("sessionCount").textContent = "0";
                return;
            }

            filtered.forEach(s => {
                const card = document.createElement("div");
                card.className = "session-card";
                const btn = s.link
                    ? '<a href="' + s.link + '" target="_blank" class="register-btn">Register Now</a>'
                    : '<span class="register-btn disabled">Registration Coming Soon</span>';
                card.innerHTML =
                    '<div class="card-header">' +
                        '<div class="card-date">' + s.day + '</div>' +
                        '<div class="card-category">' + s.category + '</div>' +
                    '</div>' +
                    '<div class="card-content">' +
                        '<div class="card-title">' + s.title + '</div>' +
                        (s.time ? '<div class="card-time">\ud83d\udd50 ' + s.time + '</div>' : '') +
                        (s.presenters ? '<div class="card-presenters"><span class="presenter-label">Presenters</span>' + s.presenters + '</div>' : '') +
                        '<div class="card-description">' + s.about + '</div>' +
                        (s.products ? '<div class="card-products">\ud83d\udce6 ' + s.products + '</div>' : '') +
                    '</div>' +
                    '<div class="card-footer">' + btn + '</div>';
                grid.appendChild(card);
            });
            document.getElementById("sessionCount").textContent = filtered.length;
        }

        monthSel.addEventListener("change", e => { currentMonth = e.target.value; sync(); });
        document.getElementById("categoryFilter").addEventListener("change", e => {
            currentCategory = e.target.value; render();
        });

        sync();
    </script>
